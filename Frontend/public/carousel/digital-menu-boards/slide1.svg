<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="menuGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#menuGrad1)"/>
  
  <!-- Menu board -->
  <rect x="80" y="40" width="240" height="180" rx="8" fill="#1f2937" stroke="#333" stroke-width="3"/>
  <rect x="90" y="50" width="220" height="160" rx="4" fill="#fff"/>
  
  <!-- Menu items -->
  <rect x="100" y="60" width="90" height="60" rx="3" fill="#fbbf24"/>
  <text x="145" y="95" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">BURGER</text>
  
  <rect x="210" y="60" width="90" height="60" rx="3" fill="#ef4444"/>
  <text x="255" y="95" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">PIZZA</text>
  
  <rect x="100" y="135" width="90" height="60" rx="3" fill="#10b981"/>
  <text x="145" y="170" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">SALAD</text>
  
  <rect x="210" y="135" width="90" height="60" rx="3" fill="#3b82f6"/>
  <text x="255" y="170" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">DRINKS</text>
  
  <text x="200" y="250" font-family="Arial" font-size="16" fill="#1a202c" text-anchor="middle" font-weight="bold">Dynamic Menu Display</text>
  <text x="200" y="275" font-family="Arial" font-size="12" fill="#4a5568" text-anchor="middle">Update Content Instantly</text>
</svg>