<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="menuGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed7aa;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#menuGrad2)"/>
  
  <!-- Laptop with WiFi -->
  <rect x="120" y="140" width="160" height="100" rx="6" fill="#1f2937" stroke="#333" stroke-width="2"/>
  <rect x="130" y="150" width="140" height="80" rx="3" fill="#60a5fa"/>
  <rect x="110" y="240" width="180" height="8" rx="4" fill="#1f2937"/>
  
  <!-- WiFi signal -->
  <circle cx="200" cy="100" r="40" stroke="#f59e0b" stroke-width="3" fill="none" opacity="0.3"/>
  <circle cx="200" cy="100" r="25" stroke="#f59e0b" stroke-width="3" fill="none" opacity="0.6"/>
  <circle cx="200" cy="100" r="10" stroke="#f59e0b" stroke-width="3" fill="none" opacity="0.9"/>
  <circle cx="200" cy="100" r="3" fill="#f59e0b"/>
  
  <!-- Arrow pointing to display -->
  <line x1="200" y1="130" x2="200" y2="145" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="200,145 195,135 205,135" fill="#f59e0b"/>
  
  <text x="200" y="275" font-family="Arial" font-size="16" fill="#1a202c" text-anchor="middle" font-weight="bold">WiFi Enabled</text>
</svg>