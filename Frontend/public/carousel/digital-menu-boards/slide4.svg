<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="menuGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbf7d0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#menuGrad4)"/>
  
  <!-- Display with dollar sign-->
  <rect x="100" y="50" width="200" height="140" rx="8" fill="#1f2937" stroke="#333" stroke-width="3"/>
  <rect x="110" y="60" width="180" height="120" rx="4" fill="#a7f3d0"/>
  
  <!-- Dollar sign -->
  <text x="200" y="140" font-family="Arial" font-size="80" fill="#059669" text-anchor="middle" font-weight="bold">$</text>
  
  <!-- Coins -->
  <circle cx="140" cy="160" r="12" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="260" cy="160" r="12" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
  
  <text x="200" y="230" font-family="Arial" font-size="16" fill="#1a202c" text-anchor="middle" font-weight="bold">Cost Effective</text>
  <text x="200" y="255" font-family="Arial" font-size="12" fill="#4a5568" text-anchor="middle">Save on Print Costs</text>
</svg>