<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="menuGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bfdbfe;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#menuGrad3)"/>
  
  <!-- Multiple connected boards -->
  <rect x="50" y="60" width="80" height="100" rx="4" fill="#1f2937" stroke="#333" stroke-width="2"/>
  <rect x="160" y="60" width="80" height="100" rx="4" fill="#1f2937" stroke="#333" stroke-width="2"/>
  <rect x="270" y="60" width="80" height="100" rx="4" fill="#1f2937" stroke="#333" stroke-width="2"/>
  
  <rect x="55" y="65" width="70" height="90" rx="2" fill="#3b82f6"/>
  <rect x="165" y="65" width="70" height="90" rx="2" fill="#3b82f6"/>
  <rect x="275" y="65" width="70" height="90" rx="2" fill="#3b82f6"/>
  
  <!-- Cloud sync -->
  <ellipse cx="200" cy="200" rx="30" ry="20" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  <text x="200" y="210" font-family="Arial" font-size="18" fill="#3b82f6" text-anchor="middle">☁</text>
  
  <!-- Sync lines -->
  <line x1="90" y1="165" x2="175" y2="195" stroke="#3b82f6" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="200" y1="165" x2="200" y2="180" stroke="#3b82f6" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="310" y1="165" x2="225" y2="195" stroke="#3b82f6" stroke-width="2" stroke-dasharray="3,3"/>
  
  <text x="200" y="250" font-family="Arial" font-size="16" fill="#1a202c" text-anchor="middle" font-weight="bold">Synchronized Updates</text>
  <text x="200" y="275" font-family="Arial" font-size="12" fill="#4a5568" text-anchor="middle">All Boards Update Together</text>
</svg>