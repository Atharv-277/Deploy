<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="glassGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5f3fc;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#glassGrad1)"/>
  
  <!-- Transparent glass display -->
  <rect x="100" y="50" width="200" height="150" rx="8" fill="rgba(255,255,255,0.3)" stroke="#06b6d4" stroke-width="3"/>
  <rect x="110" y="60" width="180" height="130" rx="4" fill="rgba(165,243,252,0.3)" stroke="#0891b2" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Content visible through glass -->
  <circle cx="150" cy="110" r="15" fill="#0ea5e9" opacity="0.5"/>
  <circle cx="200" cy="130" r="20" fill="#06b6d4" opacity="0.5"/>
  <circle cx="250" cy="100" r="15" fill="#0891b2" opacity="0.5"/>
  
  <!-- Transparency indicator -->
  <text x="200" y="240" font-family="Arial" font-size="16" fill="#1a202c" text-anchor="middle" font-weight="bold">Transparent Display</text>
  <text x="200" y="265" font-family="Arial" font-size="12" fill="#4a5568" text-anchor="middle">See Through Technology</text>
</svg>