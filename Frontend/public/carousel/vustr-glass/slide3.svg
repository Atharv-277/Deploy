<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="glassGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f3ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ddd6fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#glassGrad3)"/>
  
  <!-- Store window with product -->
  <rect x="60" y="40" width="280" height="160" rx="8" fill="rgba(255,255,255,0.3)" stroke="#8b5cf6" stroke-width="3"/>
  
  <!-- Product behind glass -->
  <circle cx="140" cy="100" r="25" fill="#a78bfa" opacity="0.7"/>
  <rect x="180" y="80" width="40" height="50" rx="4" fill="#c4b5fd" opacity="0.7"/>
  <circle cx="260" cy="110" r="30" fill="#a78bfa" opacity="0.7"/>
  
  <!-- Info overlay on glass -->
  <rect x="100" y="140" width="200" height="40" rx="6" fill="rgba(167,139,250,0.3)" stroke="#8b5cf6" stroke-width="2"/>
  <text x="200" y="165" font-family="Arial" font-size="14" fill="#5b21b6" text-anchor="middle" font-weight="bold">Product Information</text>
  
  <text x="200" y="230" font-family="Arial" font-size="16" fill="#1a202c" text-anchor="middle" font-weight="bold">Retail Showcase</text>
  <text x="200" y="255" font-family="Arial" font-size="12" fill="#4a5568" text-anchor="middle">Enhanced Shopping Experience</text>
</svg>