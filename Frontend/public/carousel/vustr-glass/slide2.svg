<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="glassGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fefce8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef08a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#glassGrad2)"/>
  
  <!-- Futuristic glass -->
  <rect x="80" y="40" width="240" height="160" rx="10" fill="rgba(255,255,255,0.4)" stroke="#eab308" stroke-width="3"/>
  <rect x="90" y="50" width="220" height="140" rx="6" fill="rgba(253,224,71,0.2)"/>
  
  <!-- Holographic effect -->
  <circle cx="150" cy="120" r="30" fill="none" stroke="#facc15" stroke-width="2" opacity="0.6"/>
  <circle cx="150" cy="120" r="40" fill="none" stroke="#fde047" stroke-width="2" opacity="0.4"/>
  
  <text x="250" y="120" font-family="Arial" font-size="24" fill="#ca8a04" text-anchor="middle" font-weight="bold">FUTURE</text>
  
  <text x="200" y="235" font-family="Arial" font-size="16" fill="#1a202c" text-anchor="middle" font-weight="bold">Futuristic Design</text>
  <text x="200" y="260" font-family="Arial" font-size="12" fill="#4a5568" text-anchor="middle">Next-Gen Aesthetics</text>
</svg>