<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="ledGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ecfeff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5f3fc;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#ledGrad3)"/>
  
  <!-- LED module/panel -->
  <rect x="80" y="50" width="100" height="100" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="3"/>
  <rect x="90" y="60" width="80" height="80" rx="2" fill="#06b6d4"/>
  
  <!-- Connecting arrows -->
  <line x1="180" y1="100" x2="210" y2="100" stroke="#0891b2" stroke-width="3"/>
  <polygon points="210,100 200,95 200,105" fill="#0891b2"/>
  
  <!-- Another module -->
  <rect x="220" y="50" width="100" height="100" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="3"/>
  <rect x="230" y="60" width="80" height="80" rx="2" fill="#06b6d4"/>
  
  <!-- Plus sign for adding more -->
  <circle cx="200" cy="180" r="20" fill="#22c55e"/>
  <line x1="200" y1="170" x2="200" y2="190" stroke="#fff" stroke-width="3"/>
  <line x1="190" y1="180" x2="210" y2="180" stroke="#fff" stroke-width="3"/>
  
  <text x="200" y="235" font-family="Arial" font-size="16" fill="#1a202c" text-anchor="middle" font-weight="bold">Modular Design</text>
  <text x="200" y="260" font-family="Arial" font-size="12" fill="#4a5568" text-anchor="middle">Easy Assembly & Expansion</text>
</svg>