<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="ledGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fee2e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecaca;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="ledGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#ledGrad1)"/>
  
  <!-- LED wall -->  
  <rect x="70" y="50" width="260" height="140" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="3"/>
  
  <!-- LED pixels/dots -->
  <g fill="#ef4444">
    <circle cx="100" cy="80" r="3"/>
    <circle cx="120" cy="80" r="3"/>
    <circle cx="140" cy="80" r="3"/>
    <circle cx="160" cy="80" r="3"/>
    <circle cx="180" cy="80" r="3"/>
    <circle cx="200" cy="80" r="3"/>
    <circle cx="220" cy="80" r="3"/>
    <circle cx="240" cy="80" r="3"/>
    <circle cx="260" cy="80" r="3"/>
    <circle cx="280" cy="80" r="3"/>
    <circle cx="300" cy="80" r="3"/>
  </g>
  <g fill="#22c55e">
    <circle cx="100" cy="100" r="3"/>
    <circle cx="120" cy="100" r="3"/>
    <circle cx="140" cy="100" r="3"/>
    <circle cx="160" cy="100" r="3"/>
    <circle cx="180" cy="100" r="3"/>
    <circle cx="200" cy="100" r="3"/>
    <circle cx="220" cy="100" r="3"/>
    <circle cx="240" cy="100" r="3"/>
    <circle cx="260" cy="100" r="3"/>
    <circle cx="280" cy="100" r="3"/>
    <circle cx="300" cy="100" r="3"/>
  </g>
  <g fill="#3b82f6">
    <circle cx="100" cy="120" r="3"/>
    <circle cx="120" cy="120" r="3"/>
    <circle cx="140" cy="120" r="3"/>
    <circle cx="160" cy="120" r="3"/>
    <circle cx="180" cy="120" r="3"/>
    <circle cx="200" cy="120" r="3"/>
    <circle cx="220" cy="120" r="3"/>
    <circle cx="240" cy="120" r="3"/>
    <circle cx="260" cy="120" r="3"/>
    <circle cx="280" cy="120" r="3"/>
    <circle cx="300" cy="120" r="3"/>
  </g>
  
  <!-- Brightness glow -->
  <circle cx="200" cy="100" r="60" fill="url(#ledGlow)" opacity="0.5"/>
  
  <text x="200" y="230" font-family="Arial" font-size="16" fill="#1a202c" text-anchor="middle" font-weight="bold">LED Technology</text>
  <text x="200" y="255" font-family="Arial" font-size="12" fill="#4a5568" text-anchor="middle">Vivid RGB Colors</text>
</svg>