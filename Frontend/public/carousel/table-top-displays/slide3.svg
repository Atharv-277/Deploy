  <text x="200" y="235" font-family="Arial" font-size="16" fill="#1a202c" text-anchor="middle" font-weight="bold">Portable & Flexible</text>
  <text x="200" y="260" font-family="Arial" font-size="12" fill="#4a5568" text-anchor="middle">Easy to Move & Position</text>
</svg>