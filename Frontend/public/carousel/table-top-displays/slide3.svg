<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="tableGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef2f2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecaca;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#tableGrad3)"/>
  
  <!-- Portable display -->
  <rect x="130" y="70" width="140" height="90" rx="6" fill="#1f2937" stroke="#333" stroke-width="3"/>
  <rect x="138" y="78" width="124" height="74" rx="3" fill="#fca5a5"/>
  <rect x="185" y="160" width="30" height="30" rx="4" fill="#475569"/>
