<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="tableGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fefce8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef08a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#tableGrad2)"/>
  
  <!-- Touch display -->
  <rect x="100" y="60" width="200" height="130" rx="8" fill="#1f2937" stroke="#333" stroke-width="3"/>
  <rect x="110" y="70" width="180" height="110" rx="4" fill="#fde047"/>
  
  <!-- Touch points -->
  <circle cx="150" cy="120" r="8" fill="#fff" opacity="0.7"/>
  <circle cx="200" cy="100" r="8" fill="#fff" opacity="0.7"/>
  <circle cx="250" cy="140" r="8" fill="#fff" opacity="0.7"/>
  
  <!-- Hand icon -->
  <text x="200" y="140" font-family="Arial" font-size="40" fill="#ca8a04" text-anchor="middle">👆</text>
  
  <text x="200" y="230" font-family="Arial" font-size="16" fill="#1a202c" text-anchor="middle" font-weight="bold">Interactive Touch</text>
  <text x="200" y="255" font-family="Arial" font-size="12" fill="#4a5568" text-anchor="middle">Engage Your Customers</text>
</svg>