<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="wallGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fffbeb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#wallGrad4)"/>
  
  <!-- 24/7 operation symbol -->
  <circle cx="200" cy="100" r="50" fill="#fff" stroke="#f59e0b" stroke-width="4"/>
  <text x="200" y="90" font-family="Arial" font-size="32" fill="#f59e0b" text-anchor="middle" font-weight="bold">24</text>
  <text x="200" y="120" font-family="Arial" font-size="32" fill="#f59e0b" text-anchor="middle" font-weight="bold">7</text>
  
  <!-- Clock arrows -->
  <line x1="200" y1="100" x2="200" y2="75" stroke="#f59e0b" stroke-width="3"/>
  <line x1="200" y1="100" x2="220" y2="100" stroke="#f59e0b" stroke-width="3"/>
  
  <!-- Checkmark -->
  <circle cx="200" cy="180" r="25" fill="#22c55e"/>
  <path d="M 190 180 L 197 187 L 210 172" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <text x="200" y="240" font-family="Arial" font-size="16" fill="#1a202c" text-anchor="middle" font-weight="bold">24/7 Operation</text>
  <text x="200" y="265" font-family="Arial" font-size="12" fill="#4a5568" text-anchor="middle">Continuous Reliability</text>
</svg>