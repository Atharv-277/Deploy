<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="wallGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fae8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9d5ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#wallGrad1)"/>
  
  <!-- 3x3 Video Wall -->
  <g transform="translate(70, 40)">
    <rect x="0" y="0" width="70" height="60" rx="2" fill="#1f2937" stroke="#333" stroke-width="2"/>
    <rect x="75" y="0" width="70" height="60" rx="2" fill="#1f2937" stroke="#333" stroke-width="2"/>
    <rect x="150" y="0" width="70" height="60" rx="2" fill="#1f2937" stroke="#333" stroke-width="2"/>
    
    <rect x="0" y="65" width="70" height="60" rx="2" fill="#1f2937" stroke="#333" stroke-width="2"/>
    <rect x="75" y="65" width="70" height="60" rx="2" fill="#1f2937" stroke="#333" stroke-width="2"/>
    <rect x="150" y="65" width="70" height="60" rx="2" fill="#1f2937" stroke="#333" stroke-width="2"/>
    
    <rect x="0" y="130" width="70" height="60" rx="2" fill="#1f2937" stroke="#333" stroke-width="2"/>
    <rect x="75" y="130" width="70" height="60" rx="2" fill="#1f2937" stroke="#333" stroke-width="2"/>
    <rect x="150" y="130" width="70" height="60" rx="2" fill="#1f2937" stroke="#333" stroke-width="2"/>
    
    <!-- Content on screens -->
    <rect x="5" y="5" width="60" height="50" rx="1" fill="#a78bfa"/>
    <rect x="80" y="5" width="60" height="50" rx="1" fill="#a78bfa"/>
<rect x="155" y="5" width="60" height="50" rx="1" fill="#a78bfa"/>
    <rect x="5" y="70" width="60" height="50" rx="1" fill="#a78bfa"/>
    <rect x="80" y="70" width="60" height="50" rx="1" fill="#a78bfa"/>
    <rect x="155" y="70" width="60" height="50" rx="1" fill="#a78bfa"/>
    <rect x="5" y="135" width="60" height="50" rx="1" fill="#a78bfa"/>
    <rect x="80" y="135" width="60" height="50" rx="1" fill="#a78bfa"/>
    <rect x="155" y="135" width="60" height="50" rx="1" fill="#a78bfa"/>
  </g>
  
  <text x="200" y="235" font-family="Arial" font-size="16" fill="#1a202c" text-anchor="middle" font-weight="bold">Scalable Video Wall</text>
  <text x="200" y="260" font-family="Arial" font-size="12" fill="#4a5568" text-anchor="middle">Multiple Displays, One Canvas</text>
</svg>