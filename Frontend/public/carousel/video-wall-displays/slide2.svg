<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="wallGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff1f2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecdd3;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#wallGrad2)"/>
  
  <!-- Ultra-thin bezels -->
  <rect x="70" y="60" width="130" height="100" rx="3" fill="#1f2937" stroke="#333" stroke-width="3"/>
  <rect x="200" y="60" width="130" height="100" rx="3" fill="#1f2937" stroke="#333" stroke-width="3"/>
  
  <rect x="75" y="65" width="120" height="90" rx="1" fill="#fb7185"/>
  <rect x="205" y="65" width="120" height="90" rx="1" fill="#fb7185"/>
  
  <!-- Zoom indicator on bezel -->
  <circle cx="200" cy="110" r="25" fill="rgba(255,255,255,0.8)"/>
  <line x1="200" y1="95" x2="200" y2="125" stroke="#333" stroke-width="2"/>
  <line x1="185" y1="110" x2="215" y2="110" stroke="#333" stroke-width="2"/>
  
  <text x="200" y="195" font-family="Arial" font-size="14" fill="#be123c" text-anchor="middle" font-weight="bold">Ultra-Narrow Bezel</text>
  
  <text x="200" y="235" font-family="Arial" font-size="16" fill="#1a202c" text-anchor="middle" font-weight="bold">Seamless Display</text>
  <text x="200" y="260" font-family="Arial" font-size="12" fill="#4a5568" text-anchor="middle">Minimal Border Distraction</text>
</svg>