<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="wallGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ecfdf5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a7f3d0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#wallGrad3)"/>
  
  <!-- Video wall with HD content -->
  <rect x="80" y="50" width="240" height="140" rx="6" fill="#1f2937" stroke="#333" stroke-width="3"/>
  <rect x="88" y="58" width="224" height="124" rx="3" fill="#10b981"/>
  
  <!-- 4K indicator -->
  <text x="200" y="110" font-family="Arial" font-size="48" fill="#fff" text-anchor="middle" font-weight="bold">4K</text>
  <text x="200" y="135" font-family="Arial" font-size="16" fill="#fff" text-anchor="middle">ULTRA HD</text>
  
  <!-- Resolution specs -->
  <rect x="130" y="155" width="140" height="25" rx="4" fill="rgba(255,255,255,0.9)"/>
  <text x="200" y="173" font-family="Arial" font-size="12" fill="#065f46" text-anchor="middle" font-weight="bold">3840 × 2160</text>
  
  <text x="200" y="230" font-family="Arial" font-size="16" fill="#1a202c" text-anchor="middle" font-weight="bold">Ultra HD Resolution</text>
  <text x="200" y="255" font-family="Arial" font-size="12" fill="#4a5568" text-anchor="middle">Crystal Clear Image Quality</text>
</svg>