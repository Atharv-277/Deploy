<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d9e2ec;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#grad1)"/>
  
  <!-- Multiple display sizes -->
  <rect x="50" y="60" width="80" height="50" rx="3" fill="#fff" stroke="#333" stroke-width="2"/>
  <rect x="150" y="50" width="100" height="70" rx="3" fill="#fff" stroke="#333" stroke-width="2"/>
  <rect x="270" y="40" width="80" height="90" rx="3" fill="#fff" stroke="#333" stroke-width="2"/>
  
  <!-- Size labels -->
  <text x="90" y="135" font-family="Arial" font-size="12" fill="#333" text-anchor="middle" font-weight="bold">24"</text>
  <text x="200" y="145" font-family="Arial" font-size="12" fill="#333" text-anchor="middle" font-weight="bold">55"</text>
  <text x="310" y="155" font-family="Arial" font-size="12" fill="#333" text-anchor="middle" font-weight="bold">86"</text>
  
  <!-- Title -->
  <text x="200" y="200" font-family="Arial" font-size="16" fill="#1a202c" text-anchor="middle" font-weight="bold">Variable Sizes</text>
  <text x="200" y="225" font-family="Arial" font-size="12" fill="#4a5568" text-anchor="middle">24" to 86" Display Options</text>
  
  <!-- Arrows showing range -->
  <line x1="60" y1="170" x2="340" y2="170" stroke="#4299e1" stroke-width="2"/>
  <polygon points="60,170 70,165 70,175" fill="#4299e1"/>
  <polygon points="340,170 330,165 330,175" fill="#4299e1"/>
</svg>