<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bfdbfe;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#grad3)"/>
  
  <!-- Cloud -->
  <ellipse cx="200" cy="60" rx="40" ry="25" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  <ellipse cx="180" cy="70" rx="25" ry="20" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  <ellipse cx="220" cy="70" rx="25" ry="20" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- Cloud icon -->
  <text x="200" y="70" font-family="Arial" font-size="24" fill="#3b82f6" text-anchor="middle">☁</text>
  
  <!-- Connection lines -->
  <line x1="200" y1="90" x2="120" y2="140" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="200" y1="90" x2="200" y2="140" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="200" y1="90" x2="280" y2="140" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Multiple displays -->
  <rect x="90" y="140" width="60" height="40" rx="3" fill="#1f2937" stroke="#333" stroke-width="2"/>
  <rect x="95" y="145" width="50" height="30" rx="2" fill="#60a5fa"/>
  
  <rect x="170" y="140" width="60" height="40" rx="3" fill="#1f2937" stroke="#333" stroke-width="2"/>
  <rect x="175" y="145" width="50" height="30" rx="2" fill="#60a5fa"/>
  
  <rect x="250" y="140" width="60" height="40" rx="3" fill="#1f2937" stroke="#333" stroke-width="2"/>
  <rect x="255" y="145" width="50" height="30" rx="2" fill="#60a5fa"/>
  
  <!-- Title -->
  <text x="200" y="220" font-family="Arial" font-size="16" fill="#1a202c" text-anchor="middle" font-weight="bold">Cloud Management</text>
  <text x="200" y="245" font-family="Arial" font-size="12" fill="#4a5568" text-anchor="middle">Remote Control from Anywhere</text>
</svg>