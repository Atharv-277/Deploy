<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbf7d0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#grad4)"/>
  
  <!-- Landscape display -->
  <g transform="translate(70, 50)">
    <rect x="0" y="0" width="120" height="80" rx="4" fill="#1f2937" stroke="#333" stroke-width="2"/>
    <rect x="5" y="5" width="110" height="70" rx="2" fill="#a7f3d0"/>
    <text x="60" y="45" font-family="Arial" font-size="12" fill="#065f46" text-anchor="middle" font-weight="bold">Landscape</text>
  </g>
  
  <!-- Rotation arrow -->
  <path d="M 200 90 Q 220 100 210 120" stroke="#10b981" stroke-width="3" fill="none"/>
  <polygon points="210,120 215,115 205,112" fill="#10b981"/>
  <circle cx="200" cy="90" r="3" fill="#10b981"/>
  
  <!-- Portrait display -->
  <g transform="translate(220, 100)">
    <rect x="0" y="0" width="80" height="120" rx="4" fill="#1f2937" stroke="#333" stroke-width="2"/>
    <rect x="5" y="5" width="70" height="110" rx="2" fill="#a7f3d0"/>
    <text x="40" y="60" font-family="Arial" font-size="12" fill="#065f46" text-anchor="middle" font-weight="bold">Portrait</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="250" font-family="Arial" font-size="16" fill="#1a202c" text-anchor="middle" font-weight="bold">Flexible Orientation</text>
  <text x="200" y="275" font-family="Arial" font-size="12" fill="#4a5568" text-anchor="middle">Landscape & Portrait Mode</text>
</svg>