<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed7aa;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#grad2)"/>
  
  <!-- Display with bright screen -->
  <rect x="100" y="50" width="200" height="150" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="3"/>
  <rect x="110" y="60" width="180" height="130" rx="4" fill="#fff"/>
  
  <!-- Brightness/Contrast rays -->
  <circle cx="200" cy="125" r="80" fill="url(#glow)"/>
  <circle cx="200" cy="125" r="50" fill="url(#glow)"/>
  
  <!-- Sun icon for brightness -->
  <circle cx="200" cy="125" r="20" fill="#fbbf24"/>
  <line x1="200" y1="95" x2="200" y2="85" stroke="#f59e0b" stroke-width="3"/>
  <line x1="200" y1="155" x2="200" y2="165" stroke="#f59e0b" stroke-width="3"/>
  <line x1="170" y1="125" x2="160" y2="125" stroke="#f59e0b" stroke-width="3"/>
  <line x1="230" y1="125" x2="240" y2="125" stroke="#f59e0b" stroke-width="3"/>
  
  <!-- Title -->
  <text x="200" y="230" font-family="Arial" font-size="16" fill="#1a202c" text-anchor="middle" font-weight="bold">High Brightness & Contrast</text>
  <text x="200" y="255" font-family="Arial" font-size="12" fill="#4a5568" text-anchor="middle">Crystal Clear Visibility</text>
</svg>